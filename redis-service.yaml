services:
  redis:
    image: docker.io/library/redis:latest
    container_name: cache-service-dev
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory-policy allkeys-lru --appendonly no
    networks:
      - backend-tier
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisinsight:
    image: docker.io/redislabs/redisinsight:latest
    container_name: cache-monitor-dev
    ports:
      - "5540:5540"
    networks:
      - backend-tier
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy

networks:
  backend-tier:
    external: true
